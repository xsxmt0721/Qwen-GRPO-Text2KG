# ============================================================
# 节点奖励函数配置
# ============================================================

# ----------------------------------------------------------
# 结构规则得分系数
# ----------------------------------------------------------
structure:
  valid_json_correct_keys: 1.0       # 可解析 + 关键字 nodes/name/type 正确
  valid_json_wrong_keys: 0.5         # 可解析 + 关键字有误（如 node/Name/TYPE）
  truncated_fixed_correct_keys: 0.8  # 截断修复后可解析 + 关键字正确
  truncated_fixed_wrong_keys: 0.4    # 截断修复后可解析 + 关键字有误
  invalid: 0.0                       # 完全不可解析

# ----------------------------------------------------------
# 长度惩罚
# ----------------------------------------------------------
length_penalty:
  function: "default_length_penalty"   # 长度惩罚函数名 (注册于 utils_reward.py)
  tolerance_ratio: 0.5                 # 容忍系数: num3 <= num1 * tolerance_ratio → 惩罚=0
  max_penalty_ratio: 3.0               # 最大惩罚系数: num3 >= num1 * max_penalty_ratio → 惩罚=-1

# ----------------------------------------------------------
# 文本匹配度 (预测 vs 标准节点, F1 分数)
# ----------------------------------------------------------
text_matching:
  use_l1_5: true               # 是否启用 L1.5 数值范围校验
  l1_5_threshold: 0.6           # L1.5 匹配阈值 (symmetric, 固定)
  l2_threshold: 0.7             # L2 Jaccard 匹配阈值 (symmetric, 固定)
  l1_5_context_window: 100      # L1.5 上下文窗口大小

# ----------------------------------------------------------
# 数据集匹配度
# ----------------------------------------------------------
dataset_matching:
  node_json_path: "Data/data/node.json"  # 标准节点集路径 (相对项目根)
  l0_score: 1.0                          # 精确名称命中得分
  initial_threshold: 0.5                 # th: L2 模糊匹配初始阈值
  max_matches_before_stop: 5             # x: 累计命中次数后停止搜索
  mode: "symmetric"                      # 数据集匹配使用对称 Jaccard

# ----------------------------------------------------------
# 最终奖励权重 (结构得分 + 长度惩罚 + 文本匹配 + 数据集匹配)
# ----------------------------------------------------------
weights:
  structure: 0.2
  length_penalty: 0.0
  text_matching: 0.6
  dataset_matching: 0.2
