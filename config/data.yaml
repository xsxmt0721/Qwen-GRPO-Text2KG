# ============================================================
# SFT 数据集构建参数
# ============================================================

# 文本分段参数
chunking:
  max_chunk_length: 500        # chunk 最大字符数
  min_overlap_length: 200      # chunk 间最小重叠字符数
  enable_filter: true          # 是否启用 chunk_filter 清洗

# 节点匹配参数
matching:
  mode: "asymmetric"           # Jaccard 模式: "symmetric" | "asymmetric"
  threshold: 0.9               # L2 / L1.5 Jaccard 匹配阈值
  use_l1_5: true               # 是否启用 L1.5 数值范围校验
  l1_5_context_window: 50      # L1.5 数值命中后，正负方向扩展的上下文窗口大小（字符）

# SFT 数据集参数
dataset:
  output_dir: "/workspace/Output/SFTDatasets"  # 输出目录
  negative_ratio: 0.2          # 负样本占比 (0.0 ~ 1.0)
  seed: 42                     # 随机种子
